# Example Grafana configuration overrides for BrightSign player
#
# Copy this file to /storage/sd/grafana.ini for quick testing,
# or to /storage/flash/configs/grafana.ini for persistence.
#
# Restart the extension after copying:
#   /var/volatile/bsext/ext_promgraf/bsext_init restart
#
# See full options: https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/

[server]
# Change the default port (default: 3000)
# http_port = 3001

# Root URL for links (useful behind reverse proxy)
# root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana/

[security]
# Change default admin credentials
admin_user = admin
admin_password = admin
allow_embedding = true

# Allow embedding in iframes (for BrightSign presentations)
allow_embedding = true

[auth.anonymous]
enabled = true
org_role = Viewer
org_name = Main Org. 

[users]
# Disable user signup
allow_sign_up = false

[alerting]
# Disable alerting (not typically needed on player)
enabled = false

[unified_alerting]
enabled = false

[log]
# Log level: debug, info, warn, error, critical
level = info

[log.console]
level = info
format = console
