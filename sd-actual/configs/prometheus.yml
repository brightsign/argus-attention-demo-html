# Example Prometheus configuration for BrightSign player
#
# Copy this file to /storage/sd/prometheus.yml for quick testing,
# or to /storage/flash/configs/prometheus.yml for persistence.
#
# Restart the extension after copying:
#   /var/volatile/bsext/ext_promgraf/bsext_init restart

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'brightsign-player'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # BrightSign Node Exporter (must be enabled via registry)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 10s

  # Grafana metrics
  - job_name: 'grafana'
    static_configs:
      - targets: ['localhost:3000']

  # Uncomment if you are using the argus exporter
  - job_name: 'argus-exporter'
    static_configs:
      - targets: ['localhost:9101']
  

  # Uncomment to scrape your own application
  # - job_name: 'my_app'
  #   static_configs:
  #     - targets: ['localhost:8080']
  #   metrics_path: /metrics
