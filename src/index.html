<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Image Viewer with Node.js in Browser</title>
    <style>
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Ensure the video is beneath the existing content */
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the entire screen */
        }
        #image-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 0);
            width: 100%;
            height: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #image {
            max-width: 100%;
            max-height: 100%;
            display: none; /* Hide the image by default */
        }
        #iframe-container {
            position: fixed;
            top: 50%;
            left: 10%;
            transform: translate(-50%, 0);
            width: 40%;
            height: 40%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script type="text/javascript" src="./bundle.js"></script>
</head>
<body onload="window.main()">
    <div id="video-container">
        <video id="video" autoplay muted loop>
            <source src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div id="image-container">
        <img id="image" alt="Live Image">
    </div>
    <div id="iframe-container">
        <iframe src="http://localhost:3000/d/argus-analytics-main/argus-people-analytics?orgId=1&from=now-5m&to=now&timezone=browser&var-datasource=prometheus&var-device=$__all&var-stream=$__all&refresh=10s&kiosk"></iframe>
    </div>
</body>
</html>
