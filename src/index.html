<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Image Viewer with Node.js in Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Ensure the video is beneath the existing content */
            overflow: hidden;
        }
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the video covers the entire screen */
        }
        #image-container {
            position: fixed;
            right: 0;
            bottom: 0;
            width: 45%;
            height: 45%;
            margin: 0;
            padding: 0;
        }
        #image {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: right bottom;
            margin: 0;
            padding: 0;
        }
    </style>
    <script type="text/javascript" src="./bundle.js"></script>
</head>
<body onload="window.main()">
    <div id="video-container">
        <video id="video" autoplay muted loop>
            <source src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div id="image-container">
        <img id="image" alt="Live Image">
    </div>
</body>
</html>
